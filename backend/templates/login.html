<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Price | Ingresar</title>
<style>
  body {
    margin: 0;
    font-family: 'Segoe UI', Arial, sans-serif;
    background: #FBF5F7;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    padding: 32px;
    width: 100%;
    max-width: 360px;
  }
  h1 { font-size: 20px; margin: 0 0 4px; color: #C2185B; }
  p.sub { color: #666; font-size: 13px; margin: 0 0 20px; }
  label { font-size: 13px; font-weight: 700; display: block; margin-bottom: 6px; }
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #ddd;
    border-radius: 8px;
    font-size: 14px;
    box-sizing: border-box;
    margin-bottom: 16px;
  }
  button {
    width: 100%;
    padding: 10px;
    background: #C2185B;
    color: #fff;
    border: none;
    border-radius: 999px;
    font-weight: 800;
    font-size: 14px;
    cursor: pointer;
  }
  .error { color: #C2185B; font-size: 13px; margin-bottom: 12px; }
</style>
</head>
<body>
  <div class="card">
    <h1>Best Price · Holi</h1>
    <p class="sub">Panel de Pricing — ingresa la clave para continuar.</p>
    {% if error %}<div class="error">Clave incorrecta, intenta nuevamente.</div>{% endif %}
    <form method="post" action="/login">
      <label for="password">Clave de acceso</label>
      <input type="password" id="password" name="password" required autofocus>
      <button type="submit">Ingresar</button>
    </form>
  </div>
</body>
</html>
